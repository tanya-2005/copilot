name: Daily Discovery

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST daily. Edit as you like.
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily discovery + matching + document generation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          CANDIDATE_NAME: ${{ secrets.CANDIDATE_NAME }}
        run: python src/scheduler/daily_discovery.py

      - name: Upload generated documents as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-documents-${{ github.run_id }}
          path: generated/
          if-no-files-found: ignore
          retention-days: 14
